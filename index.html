<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>游侠 3D 战机</title>
<style>
*{box-sizing:border-box}html,body{margin:0;overflow:hidden;background:#020812;color:#effcff;font-family:Arial,"Microsoft YaHei",sans-serif}canvas{position:fixed;inset:0;touch-action:none}.shade{position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle,transparent 45%,#01050ba8);box-shadow:inset 0 0 90px #000}.top{position:fixed;z-index:3;left:0;right:0;top:0;height:78px;padding:17px 25px;display:flex;justify-content:space-between;border-bottom:1px solid #75ecff40;background:linear-gradient(#04121dcc,transparent)}.logo b,.logo small{display:block}.logo b{letter-spacing:.25em}.logo small{color:#72ddeb;letter-spacing:.3em;margin-top:5px}.zone{font-size:11px;color:#8ab7c0}.zone b{color:#eaffff}.hud{position:fixed;z-index:4;top:100px}.left{left:25px;width:210px}.right{right:25px;text-align:right}.hud label,.hud small{display:block;color:#7caeb8;font-size:10px;letter-spacing:.15em}.bar{height:10px;border:1px solid #62e6fa66;background:#06131b;margin:7px 0}.bar i{display:block;height:100%;background:linear-gradient(90deg,#22bcd3,#a4fbff);box-shadow:0 0 14px #5cefff}.hud strong{font-size:22px}.right span,.right b{display:block}.right span{font-size:9px;color:#72a7b2;letter-spacing:.2em}.right b{font-size:25px;text-shadow:0 0 13px #56e8ff}.cross{position:fixed;z-index:2;left:50%;top:44%;width:84px;height:84px;transform:translate(-50%,-50%);border:1px solid #8cf2ff66;border-radius:50%}.cross:before,.cross:after{content:"";position:absolute;background:#aff8ff}.cross:before{width:1px;height:24px;left:41px;top:29px}.cross:after{height:1px;width:24px;left:29px;top:41px}.controls{position:fixed;z-index:4;bottom:25px;left:50%;transform:translateX(-50%);padding:10px 18px;border:1px solid #65e9fa4d;background:#03111acc;font-size:11px;color:#99bbc1}.controls b{color:#d1fbff}.fire{position:fixed;z-index:5;right:25px;bottom:25px;width:88px;height:88px;border-radius:50%;border:2px solid #ff8a69;background:#a72c24cc;color:white;font-weight:900;letter-spacing:.15em;box-shadow:0 0 25px #ff493a88;cursor:pointer}.screen{position:fixed;z-index:9;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;background:radial-gradient(circle at 50% 45%,#0b394bdd,#010711f5);padding:20px}.screen.hide{display:none}.screen p{font-size:10px;color:#5ee7f7;letter-spacing:.5em}.screen h1{font-size:clamp(52px,10vw,112px);font-style:italic;margin:0;background:linear-gradient(#fff,#8deafa 60%,#317e9b);color:transparent;background-clip:text}.screen h2{font-size:15px;font-weight:400;letter-spacing:.3em;color:#a4c3c9;margin:25px}.screen button{padding:16px 48px;border:1px solid #70ecff;background:#12677ccc;color:white;font-weight:800;font-size:16px;letter-spacing:.2em;cursor:pointer}.screen small{margin-top:25px;color:#7e9da3;line-height:2}.boss{position:fixed;z-index:5;top:92px;left:50%;transform:translateX(-50%);color:#ff6851;font-weight:900;letter-spacing:.4em;text-shadow:0 0 14px red;display:none}@media(max-width:650px){.top{height:65px;padding:12px}.zone,.controls{display:none}.hud{top:78px}.left{left:12px;width:145px}.right{right:12px}.fire{right:16px;bottom:16px;width:76px;height:76px}.screen h2{font-size:11px;line-height:2}}
</style>
</head>
<body>
<canvas id="game"></canvas><div class="shade"></div>
<div class="top"><div class="logo"><b>RANGER WING</b><small>游侠 3D 战机</small></div><div class="zone">任务区域　<b>云海峡谷 · <span id="wave">1</span></b></div></div>
<div class="hud left"><label>机体完整度</label><div class="bar"><i id="hpbar" style="width:100%"></i></div><strong id="hp">100%</strong><small>护盾系统 ONLINE</small></div>
<div class="hud right"><span>SCORE</span><b id="score">0000000</b><span>击落 <b id="kills">0</b></span></div>
<div class="cross"></div><div class="boss" id="boss">WARNING · BOSS</div>
<div class="controls"><b>WASD / 方向键</b> 飞行　 <b>空格 / J / 点击</b> 射击</div><button class="fire" id="fire">开火</button>
<section class="screen" id="start"><p>3D FLIGHT COMBAT</p><h1>游侠战机</h1><h2>驾驶 3D 战机，突破空中怪物封锁线</h2><button id="startBtn">启动引擎 ›</button><small>电脑：WASD 移动，空格射击<br>手机：拖动屏幕移动，点击“开火”射击</small></section>
<section class="screen hide" id="over"><p>MISSION FAILED</p><h1>战机坠毁</h1><h2 id="result"></h2><button id="again">再次出击 ›</button></section>
<script>
const C=document.querySelector("#game"),X=C.getContext("2d"),keys=new Set(),$=s=>document.querySelector(s);
let G,run=false,last=0,shot=0;
function reset(){G={x:0,y:.38,hp:100,score:0,wave:1,kills:0,bullets:[],enemies:[],spawn:0,flash:0};run=true;$("#start").classList.add("hide");$("#over").classList.add("hide")}
function resize(){let d=Math.min(devicePixelRatio,2);C.width=innerWidth*d;C.height=innerHeight*d;C.style.width=innerWidth+"px";C.style.height=innerHeight+"px";X.setTransform(d,0,0,d,0,0)}resize();addEventListener("resize",resize);
function fire(){let n=performance.now();if(!run||n-shot<130)return;shot=n;G.bullets.push({x:G.x-.055,y:G.y,z:.9},{x:G.x+.055,y:G.y,z:.9})}
addEventListener("keydown",e=>{keys.add(e.key.toLowerCase());if(e.code==="Space"){e.preventDefault();fire()}});addEventListener("keyup",e=>keys.delete(e.key.toLowerCase()));
C.onpointermove=e=>{if(!run||!e.buttons)return;G.x=Math.max(-.9,Math.min(.9,e.clientX/innerWidth*2-1));G.y=Math.max(-.15,Math.min(.88,e.clientY/innerHeight*1.25-.18))};C.onpointerdown=e=>{C.onpointermove(e);fire()};$("#fire").onpointerdown=fire;$("#startBtn").onclick=reset;$("#again").onclick=reset;
function sky(t){let w=innerWidth,h=innerHeight,g=X.createLinearGradient(0,0,0,h);g.addColorStop(0,"#07182d");g.addColorStop(.46,"#155773");g.addColorStop(1,"#d48d5b");X.fillStyle=g;X.fillRect(0,0,w,h);X.fillStyle="#efbd78";X.beginPath();X.arc(w*.73,h*.23,Math.min(w,h)*.075,0,7);X.fill();for(let i=0;i<18;i++){let y=h*((i*.137+t*.000025*(i%3+1))%1),x=(i*173)%w;X.fillStyle="rgba(225,245,245,.04)";X.beginPath();X.ellipse(x,y,180+i*8,25+i%3*8,0,0,7);X.fill()}X.strokeStyle="#fff1";for(let i=0;i<9;i++){X.beginPath();X.moveTo(w/2,h*.34);X.lineTo(w*i/8,h);X.stroke()}if(G&&G.flash){X.fillStyle=G.flash>0?"#5ff2ff1f":"#ff251f35";X.fillRect(0,0,w,h)}}
const proj=(x,y,z)=>({x:innerWidth/2+x*innerWidth*(.19+.44*z),y:innerHeight*(.32+y*(.16+.47*z)),s:.15+.85*z});
function enemy(p,e){let s=p.s*(e.boss?1.8:1),r=42*s;X.save();X.translate(p.x,p.y);X.shadowColor=e.boss?"#ff4234":"#ff9d3d";X.shadowBlur=22*s;X.fillStyle=e.boss?"#681f2b":"#2b1820";X.beginPath();X.moveTo(0,-r);X.lineTo(r*.55,-r*.15);X.lineTo(r*1.4,r*.45);X.lineTo(r*.32,r*.36);X.lineTo(0,r);X.lineTo(-r*.32,r*.36);X.lineTo(-r*1.4,r*.45);X.lineTo(-r*.55,-r*.15);X.closePath();X.fill();X.fillStyle="#ff633d";X.fillRect(-r*.12,-r*.5,r*.24,r*.58);X.fillRect(-r*1.45,-r*1.35,r*2.9*(e.hp/e.max),5);X.restore()}
function plane(p){let r=62*p.s;X.save();X.translate(p.x,p.y);X.rotate(G.x*.12);X.shadowColor="#47eaff";X.shadowBlur=22;X.fillStyle="#bdd0d9";X.beginPath();X.moveTo(0,-r);X.lineTo(r*.22,-r*.12);X.lineTo(r*1.35,r*.38);X.lineTo(r*.3,r*.32);X.lineTo(r*.18,r);X.lineTo(0,r*.68);X.lineTo(-r*.18,r);X.lineTo(-r*.3,r*.32);X.lineTo(-r*1.35,r*.38);X.lineTo(-r*.22,-r*.12);X.closePath();X.fill();X.fillStyle="#156c84";X.beginPath();X.ellipse(0,-r*.12,r*.15,r*.38,0,0,7);X.fill();X.fillStyle="#72efff";X.fillRect(-r*.32,r*.38,r*.12,r*.44);X.fillRect(r*.2,r*.38,r*.12,r*.44);X.restore()}
function loop(t){let dt=Math.min(.035,(t-last)/1000||0);last=t;sky(t);if(run){let v=dt*1.45;if(keys.has("a")||keys.has("arrowleft"))G.x-=v;if(keys.has("d")||keys.has("arrowright"))G.x+=v;if(keys.has("w")||keys.has("arrowup"))G.y-=v;if(keys.has("s")||keys.has("arrowdown"))G.y+=v;if(keys.has(" ")||keys.has("j"))fire();G.x=Math.max(-.9,Math.min(.9,G.x));G.y=Math.max(-.15,Math.min(.88,G.y));G.spawn-=dt;if(G.spawn<=0){let boss=(G.kills+1)%20===0&&!G.enemies.some(e=>e.boss),hp=boss?38+G.wave*7:2+Math.floor(G.wave/2);G.enemies.push({x:(Math.random()*2-1)*.82,y:Math.random()*.75-.08,z:.02,hp,max:hp,boss,phase:Math.random()*7});G.spawn=Math.max(.28,1.05-G.wave*.05)}G.bullets.forEach(b=>b.z-=dt*1.75);G.bullets=G.bullets.filter(b=>b.z>-.05);G.enemies.forEach(e=>{e.z+=dt*(e.boss?.085:.14+G.wave*.007);e.x+=Math.sin(t*.0018+e.phase)*dt*(e.boss?.18:.3)});for(let b of G.bullets)for(let e of G.enemies)if(e.hp>0&&Math.abs(b.z-e.z)<.075&&Math.abs(b.x-e.x)<(e.boss?.22:.1)&&Math.abs(b.y-e.y)<(e.boss?.2:.11)){e.hp--;b.z=-1;G.flash=1}for(let e of G.enemies)if(e.hp<=0){G.score+=e.boss?2500:150;G.kills++;e.z=2}for(let e of G.enemies)if(e.z>.92&&e.z<1.5){if(Math.abs(e.x-G.x)<(e.boss?.35:.2)&&Math.abs(e.y-G.y)<(e.boss?.3:.18)){G.hp-=e.boss?45:18;G.flash=-1}e.z=2}G.enemies=G.enemies.filter(e=>e.z<1.5);if(G.kills>=G.wave*12)G.wave++;G.flash*=.86;G.enemies.slice().sort((a,b)=>a.z-b.z).forEach(e=>enemy(proj(e.x,e.y,e.z),e));G.bullets.forEach(b=>{let p=proj(b.x,b.y,b.z);X.fillStyle="#7af5ff";X.fillRect(p.x-2,p.y-18*p.s,4,24*p.s)});plane(proj(G.x,G.y,.95));$("#hpbar").style.width=Math.max(0,G.hp)+"%";$("#hp").textContent=Math.max(0,G.hp)+"%";$("#score").textContent=String(G.score).padStart(7,"0");$("#kills").textContent=G.kills;$("#wave").textContent=G.wave;$("#boss").style.display=G.enemies.some(e=>e.boss)?"block":"none";if(G.hp<=0){run=false;$("#result").textContent=`最终得分 ${G.score} · 击落 ${G.kills}`;$("#over").classList.remove("hide")}}requestAnimationFrame(loop)}requestAnimationFrame(loop);
</script>
</body></html>
